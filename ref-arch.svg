<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" width="1280" height="900" role="img" aria-label="Agentic Solutions Reference Architecture">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa8bd"/>
    </marker>
    <marker id="arrowS" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#cbd5e1"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text{font-family:'Segoe UI',Inter,system-ui,sans-serif}
      .t{fill:#f8fafc;font-weight:700}
      .b{fill:#dbe4f0}
      .m{fill:#93a3b8}
      .box{stroke-width:1}
      .new{stroke-width:1.8}
      .both{stroke:#38bdf8;fill:rgba(56,189,248,0.10)}
      .ent{stroke:#fbbf24;fill:rgba(251,191,36,0.10)}
      .our{stroke:#34d399;fill:rgba(52,211,153,0.10)}
      .am{stroke:#F2A93B;fill:rgba(242,169,59,0.13)}
      .mag{stroke:#f472b6;fill:rgba(244,114,182,0.10)}
      .half{stroke:#46607f;fill:rgba(255,255,255,0.04);stroke-width:1}
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1280" height="900" fill="#0b1220"/>

  <!-- title -->
  <text x="640" y="42" text-anchor="middle" class="t" font-size="26">Agentic Solutions: Reference Architecture</text>
  <text x="640" y="66" text-anchor="middle" class="m" font-size="13">hybrid device ↔ server execution · mesh interconnect · local-first personal agents · cross-cutting trust, observability &amp; economics</text>

  <!-- ============ LEFT EDGE COLUMN: Personal principal (NEW) ============ -->
  <rect x="18" y="86" width="172" height="606" rx="14" stroke="#f472b6" fill="rgba(244,114,182,0.05)" stroke-dasharray="5 5" stroke-width="1"/>
  <text x="104" y="106" text-anchor="middle" class="m" font-size="12.5">Personal principal</text>
  <text x="104" y="121" text-anchor="middle" class="m" font-size="12.5">(local-first)</text>

  <!-- Human glyph -->
  <circle cx="104" cy="150" r="15" stroke="#f472b6" fill="rgba(244,114,182,0.14)" stroke-width="1.6"/>
  <path d="M84,184 C84,166 124,166 124,184" stroke="#f472b6" fill="none" stroke-width="1.6"/>
  <text x="104" y="205" text-anchor="middle" class="b" font-size="13" font-weight="600">Human / Principal</text>

  <!-- Human -> Personal Agent -->
  <line x1="104" y1="212" x2="104" y2="248" stroke="#9aa8bd" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Personal Agent box -->
  <rect x="30" y="252" width="148" height="256" rx="12" class="box mag new"/>
  <text x="104" y="286" text-anchor="middle" class="t" font-size="14">Personal Agent</text>
  <text x="104" y="305" text-anchor="middle" class="m" font-size="12.5">(principal type)</text>
  <text x="104" y="336" text-anchor="middle" class="b" font-size="13">private memory,</text>
  <text x="104" y="355" text-anchor="middle" class="b" font-size="13">credentials,</text>
  <text x="104" y="374" text-anchor="middle" class="b" font-size="13">consent</text>
  <text x="104" y="404" text-anchor="middle" class="b" font-size="13">local-first</text>
  <text x="104" y="432" text-anchor="middle" class="b" font-size="13">economic proxy</text>

  <!-- Personal Agent -> core -->
  <line x1="178" y1="360" x2="203" y2="360" stroke="#9aa8bd" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Personal Agent -> bus -->
  <path d="M104,508 V562 H203" fill="none" stroke="#9aa8bd" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ============ CENTER CORE ============ -->

  <!-- Row A -->
  <rect x="205" y="95" width="370" height="80" rx="12" class="box both"/>
  <text x="390" y="122" text-anchor="middle" class="t" font-size="15">Surfaces &amp; Interop</text>
  <text x="390" y="144" text-anchor="middle" class="b" font-size="13">chat · task-inbox · voice · dashboards</text>
  <text x="390" y="163" text-anchor="middle" class="b" font-size="13">SDK · API · CLI · A2A · MCP · OTel</text>

  <rect x="590" y="95" width="370" height="80" rx="12" class="box both"/>
  <text x="775" y="122" text-anchor="middle" class="t" font-size="15">Authoring</text>
  <text x="775" y="144" text-anchor="middle" class="b" font-size="13">self-service · conversational creation</text>
  <text x="775" y="163" text-anchor="middle" class="b" font-size="13">templates</text>

  <!-- flow A -> B -->
  <line x1="582" y1="176" x2="582" y2="188" stroke="#7c8aa0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Row B -->
  <rect x="205" y="190" width="755" height="62" rx="12" class="box both"/>
  <text x="582" y="215" text-anchor="middle" class="t" font-size="15">Orchestration</text>
  <text x="582" y="237" text-anchor="middle" class="b" font-size="13">delegation · workflows · routing · triggers · negotiation · human-in-the-loop</text>

  <!-- flow B -> runtime -->
  <line x1="582" y1="252" x2="582" y2="266" stroke="#7c8aa0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Row C : THE hybrid runtime band (single Agent Runtime spanning device and server) -->
  <rect x="205" y="268" width="755" height="160" rx="14" class="box mag new"/>
  <text x="582" y="294" text-anchor="middle" class="t" font-size="15">Agent Runtime (hybrid execution)</text>
  <text x="582" y="314" text-anchor="middle" class="b" font-size="13">loop · context assembly · tool-calling · planning · reflection · working memory</text>

  <!-- left half: on-device -->
  <rect x="219" y="326" width="356" height="72" rx="10" class="half"/>
  <text x="397" y="349" text-anchor="middle" class="t" font-size="13.5">On-device (in-app)</text>
  <text x="397" y="369" text-anchor="middle" class="b" font-size="13">on-device models</text>
  <text x="397" y="388" text-anchor="middle" class="b" font-size="13">the user's live browser / files / session</text>

  <!-- right half: server -->
  <rect x="589" y="326" width="356" height="72" rx="10" class="half"/>
  <text x="767" y="349" text-anchor="middle" class="t" font-size="13.5">Server (gateway)</text>
  <text x="767" y="369" text-anchor="middle" class="b" font-size="13">heavy reasoning · cloud models</text>
  <text x="767" y="388" text-anchor="middle" class="b" font-size="13">persistence · mesh reach</text>

  <!-- seam: bidirectional movement + placement policy label -->
  <line x1="565" y1="362" x2="599" y2="362" stroke="#cbd5e1" stroke-width="1.4" marker-start="url(#arrowS)" marker-end="url(#arrowS)"/>
  <text x="582" y="417" text-anchor="middle" class="m" font-size="12.5">placement policy: privacy · latency · cost · capability · connectivity</text>

  <!-- runtime -> support -->
  <line x1="582" y1="428" x2="582" y2="442" stroke="#7c8aa0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- support boxes -->
  <rect x="205" y="444" width="370" height="68" rx="12" class="box both"/>
  <text x="390" y="470" text-anchor="middle" class="t" font-size="14.5">Capabilities</text>
  <text x="390" y="492" text-anchor="middle" class="b" font-size="13">tools · skills · code/sandbox · browser · files · MCP</text>

  <rect x="590" y="444" width="370" height="68" rx="12" class="box both"/>
  <text x="775" y="470" text-anchor="middle" class="t" font-size="14.5">Model plane / LLM Gateway</text>
  <text x="775" y="492" text-anchor="middle" class="b" font-size="13">routed local + cloud model access with fallback</text>

  <!-- support -> bus -->
  <line x1="582" y1="512" x2="582" y2="528" stroke="#7c8aa0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- node glyphs sitting on the bus -->
  <rect x="700" y="513" width="16" height="16" rx="4" fill="rgba(242,169,59,0.16)" stroke="#F2A93B" stroke-width="1"/>
  <rect x="726" y="513" width="16" height="16" rx="4" fill="rgba(242,169,59,0.16)" stroke="#F2A93B" stroke-width="1"/>
  <rect x="752" y="513" width="16" height="16" rx="4" fill="rgba(242,169,59,0.16)" stroke="#F2A93B" stroke-width="1"/>
  <line x1="708" y1="529" x2="708" y2="530" stroke="#F2A93B" stroke-width="1"/>
  <line x1="734" y1="529" x2="734" y2="530" stroke="#F2A93B" stroke-width="1"/>
  <line x1="760" y1="529" x2="760" y2="530" stroke="#F2A93B" stroke-width="1"/>

  <!-- Row D : mesh bus pill -->
  <rect x="205" y="530" width="755" height="64" rx="30" class="am" stroke-width="2.4" filter="url(#glow)"/>
  <text x="582" y="557" text-anchor="middle" class="t" font-size="16" fill="#F2A93B">AgentMesh · the signed interconnect</text>
  <text x="582" y="579" text-anchor="middle" class="b" font-size="13">identity · discovery · request/respond · pub/sub · tasks · streaming · nodes</text>

  <!-- bus -> Row E -->
  <line x1="582" y1="594" x2="582" y2="610" stroke="#7c8aa0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Row E -->
  <rect x="205" y="612" width="370" height="80" rx="12" class="box both"/>
  <text x="390" y="640" text-anchor="middle" class="t" font-size="15">Context &amp; Knowledge</text>
  <text x="390" y="662" text-anchor="middle" class="b" font-size="13">memory · world-model · context fabric</text>
  <text x="390" y="681" text-anchor="middle" class="b" font-size="13">vector · RAG / retrieval · state · artifacts</text>

  <rect x="590" y="612" width="370" height="80" rx="12" class="box both"/>
  <text x="775" y="640" text-anchor="middle" class="t" font-size="15">Registry &amp; Catalog</text>
  <text x="775" y="662" text-anchor="middle" class="b" font-size="13">manifests · agent cards · discovery (ARD)</text>
  <text x="775" y="681" text-anchor="middle" class="b" font-size="13">governance</text>

  <!-- ============ RIGHT : cross-cutting backplanes ============ -->
  <rect x="975" y="95" width="90" height="597" rx="12" class="box both"/>
  <g transform="translate(1020,393) rotate(-90)">
    <text text-anchor="middle" y="-7" class="t" font-size="14">Identity, Trust &amp; Policy</text>
    <text text-anchor="middle" y="12" class="m" font-size="12">keys/attestation · Authz Fabric (PDP/PEP) · guardrails · secrets · privacy · audit</text>
  </g>

  <rect x="1075" y="95" width="90" height="597" rx="12" class="box both"/>
  <g transform="translate(1120,393) rotate(-90)">
    <text text-anchor="middle" y="-7" class="t" font-size="14">Observability &amp; Evaluation</text>
    <text text-anchor="middle" y="12" class="m" font-size="12">tracing · metrics · feedback · eval · event ledger</text>
  </g>

  <rect x="1175" y="95" width="90" height="597" rx="12" class="box both"/>
  <g transform="translate(1220,393) rotate(-90)">
    <text text-anchor="middle" y="-7" class="t" font-size="14">Economics &amp; Metering</text>
    <text text-anchor="middle" y="12" class="m" font-size="12">cost · budgets · metering · marketplace</text>
  </g>

  <text x="1120" y="714" text-anchor="middle" class="m" font-size="12.5">cross-cutting spines (touch every layer)</text>

  <!-- ============ LEGEND (bottom-left) ============ -->
  <rect x="18" y="730" width="470" height="124" rx="12" stroke="#334a63" fill="rgba(255,255,255,0.02)" stroke-width="1"/>
  <text x="36" y="754" class="t" font-size="14">Legend</text>

  <rect x="36" y="766" width="16" height="16" rx="8" stroke="#F2A93B" fill="rgba(242,169,59,0.13)" stroke-width="2"/>
  <text x="62" y="779" class="b" font-size="13">AgentMesh: this protocol (the interconnect)</text>

  <rect x="36" y="792" width="16" height="16" rx="4" stroke="#38bdf8" fill="rgba(56,189,248,0.10)" stroke-width="1.4"/>
  <text x="62" y="805" class="b" font-size="13">The rest of the stack: built by whoever consumes the mesh</text>

  <rect x="36" y="818" width="16" height="16" rx="4" stroke="#f472b6" fill="rgba(244,114,182,0.12)" stroke-width="1.8"/>
  <text x="62" y="831" class="b" font-size="13">Elements most maps leave out: personal agents, hybrid execution</text>

  <text x="290" y="754" class="m" font-size="12.5">on the bus:</text>
  <rect x="360" y="742" width="14" height="14" rx="4" fill="rgba(242,169,59,0.16)" stroke="#F2A93B" stroke-width="1"/>
  <text x="382" y="754" class="m" font-size="12.5">agents / services</text>
</svg>
